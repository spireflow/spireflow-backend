name: Feature Request
description: Suggest a new feature or improvement for the backend
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. If your request is related to the frontend, please open it in the [main repository](https://github.com/nellavio/nellavio/issues).

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this be useful? What problem does it solve?
    validations:
      required: false
